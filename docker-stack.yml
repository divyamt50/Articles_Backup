services:
  api:
    image: miniart-api:latest
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000:8000"
    ports: 
      - "8000:8000" 
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@db:5432/fastapi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET_KEY: a_long_string
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
  
  worker:
    image: miniart-api:latest
    command: celery -A tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:password@db:5421/fastapi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fastapi_db
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine

volumes:
  pgdata: